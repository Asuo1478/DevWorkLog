<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>登录 - 研发工作日记系统</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#fbf9f8",
              "inverse-surface": "#303030",
              "on-primary-fixed-variant": "#00468b",
              "on-tertiary-fixed": "#00201b",
              "surface-tint": "#005db5",
              "surface-container": "#efeded",
              "secondary-fixed": "#cbe6ff",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              "surface-container-high": "#e9e8e7",
              "on-primary-container": "#cadcff",
              "tertiary-fixed-dim": "#83d5c5",
              "on-secondary": "#ffffff",
              "on-secondary-container": "#4e677c",
              "tertiary-fixed": "#9ff2e1",
              "surface-dim": "#dbdad9",
              "on-tertiary-container": "#97ead9",
              "error-container": "#ffdad6",
              "primary-fixed": "#d6e3ff",
              "secondary-container": "#cbe6ff",
              "outline": "#727783",
              "tertiary": "#005247",
              "on-error-container": "#93000a",
              "error": "#ba1a1a",
              "surface": "#fbf9f8",
              "on-error": "#ffffff",
              "tertiary-container": "#036c5f",
              "primary-container": "#005fb8",
              "on-secondary-fixed": "#001e30",
              "secondary": "#486176",
              "surface-container-low": "#f5f3f3",
              "inverse-on-surface": "#f2f0f0",
              "on-surface-variant": "#424752",
              "on-primary-fixed": "#001b3d",
              "secondary-fixed-dim": "#afcae2",
              "primary": "#00488d",
              "outline-variant": "#c2c6d4",
              "on-tertiary-fixed-variant": "#005046",
              "on-secondary-fixed-variant": "#30495d",
              "surface-container-highest": "#e4e2e2",
              "primary-fixed-dim": "#a8c8ff",
              "on-surface": "#1b1c1c",
              "surface-container-lowest": "#ffffff",
              "on-background": "#1b1c1c",
              "background": "#fbf9f8",
              "inverse-primary": "#a8c8ff",
              "surface-variant": "#e4e2e2"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #00488d 0%, #005fb8 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Auth Canvas -->
<main class="w-full max-w-md px-6 py-12">
<!-- Brand Identity Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container-low mb-6">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="edit_note">edit_note</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary mb-2">
                研发工作日记系统
            </h1>
<p class="text-on-surface-variant font-medium tracking-wide text-sm opacity-80 uppercase">
                Enterprise Editorial Workspace
            </p>
</div>
<!-- Login Ledger Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_12px_32px_rgba(0,72,141,0.06)]">
<form action="#" class="space-y-6" method="POST">
<!-- Email/User Input -->
<div class="space-y-2">
<label class="font-label text-xs font-bold text-on-surface-variant tracking-wider uppercase pl-1" for="identifier">
                        用户名或企业邮箱
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="alternate_email">alternate_email</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all duration-200 text-on-surface placeholder-outline-variant" id="identifier" name="identifier" placeholder="name@company.com" required="" type="text"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 bg-primary group-focus-within:w-full transition-all duration-300"></div>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-xs font-bold text-on-surface-variant tracking-wider uppercase" for="password">
                            密码
                        </label>
<a class="text-xs font-semibold text-primary hover:underline decoration-2 underline-offset-4" href="#">忘记密码？</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-0 focus:bg-surface-container-lowest transition-all duration-200 text-on-surface placeholder-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<div class="absolute bottom-0 left-0 h-0.5 w-0 bg-primary group-focus-within:w-full transition-all duration-300"></div>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center px-1">
<input class="h-4 w-4 text-primary focus:ring-primary-container border-outline-variant rounded bg-surface-container-low transition-colors" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block text-sm font-medium text-on-surface-variant" for="remember-me">
                        保持登录状态
                    </label>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="editorial-gradient w-full py-3.5 px-4 text-on-primary font-headline font-bold text-sm tracking-widest rounded-lg shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-95 transition-all duration-200 flex items-center justify-center space-x-2" type="submit">
<span>登录系统</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Secondary Actions -->
<div class="mt-8 text-center space-y-4">
<p class="text-on-surface-variant text-xs">
                还没有账户？ <a class="text-primary font-bold hover:underline underline-offset-4" href="#">联系管理员申请</a>
</p>
<div class="flex items-center justify-center space-x-4 pt-4">
<div class="h-[1px] w-8 bg-surface-dim"></div>
<span class="text-[10px] font-label font-bold text-outline tracking-widest uppercase">Secured Access</span>
<div class="h-[1px] w-8 bg-surface-dim"></div>
</div>
</div>
</main>
<!-- Subtle Architectural Background Detail -->
<div class="fixed top-0 right-0 p-12 opacity-5 pointer-events-none hidden lg:block">
<span class="material-symbols-outlined text-[12rem] text-primary" data-icon="architecture">architecture</span>
</div>
<div class="fixed bottom-0 left-0 p-12 opacity-5 pointer-events-none hidden lg:block">
<span class="material-symbols-outlined text-[12rem] text-primary" data-icon="inventory_2">inventory_2</span>
</div>
</body></html>
